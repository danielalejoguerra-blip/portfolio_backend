services:
  # ── Base de datos ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: portfolio_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (para Socket.IO pub/sub) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build: .
    image: ${DOCKER_IMAGE:-danielwar/portfolio-api}:${IMAGE_TAG:-latest}
    container_name: portfolio_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      SOCKETIO_REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-api.danielwar.tech}
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-[]}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    expose:
      - "5003"

  # ── Nginx (reverse proxy + SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: portfolio_nginx
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

  # ── Certbot (renovación SSL) ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: portfolio_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
