# ── HTTP → redirigir a HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name api.danielwar.tech;

    # Ruta para validación de certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.danielwar.tech;

    ssl_certificate     /etc/letsencrypt/live/api.danielwar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.danielwar.tech/privkey.pem;

    # Parámetros SSL recomendados
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Tamaño máximo de cuerpo de petición
    client_max_body_size 20M;

    # ── API REST ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://api:5003;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Socket.IO (WebSocket) ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://api:5003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }
}
