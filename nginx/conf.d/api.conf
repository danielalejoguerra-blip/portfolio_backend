# ── HTTP ─────────────────────────────────────────────────────────────────────
# PASO 1: Solo HTTP hasta obtener el certificado SSL.
# Una vez obtenido el certificado, reemplazar este bloque por la versión
# completa con HTTPS que se encuentra comentada más abajo.
server {
    listen 80;
    server_name api.danielwar.tech;

    # Ruta para validación de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tamaño máximo de cuerpo de petición
    client_max_body_size 20M;

    # ── API REST ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://api:5003;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Socket.IO (WebSocket) ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://api:5003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }
}

