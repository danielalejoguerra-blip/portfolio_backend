# Configuración temporal SIN SSL - solo para obtener el certificado de Let's Encrypt
server {
    listen 80;
    server_name api.danielwar.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
